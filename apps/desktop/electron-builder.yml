appId: com.tggf.desktop
productName: tg-gf
electronVersion: 31.7.7
npmRebuild: false

directories:
  output: release

files:
  - dist/**
  - package.json
  - "!src/**"

extraResources:
  - from: ../../dist
    to: dist
  - from: ../api/dist
    to: apps/api/dist

win:
  signAndEditExecutable: false
  target:
    - nsis

mac:
  target:
    - dmg

linux:
  target:
    - AppImage
